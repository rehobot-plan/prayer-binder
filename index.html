<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기도 바인더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --paper:#F7F3EC; --paper2:#EDE8DF; --paper3:#E3DDCF;
  --ink:#1E1A14; --ink2:#4A4438; --ink3:#8A8070; --rule:#D8D0C0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#2A2520;font-family:'Noto Sans KR',sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;}

/* TITLE */
.binder-title-wrap{display:flex;justify-content:center;margin-bottom:24px;}
.binder-title{font-size:20px;font-weight:700;letter-spacing:0.2em;color:#9A8F7A;
  cursor:pointer;user-select:none;padding:4px 10px;border-radius:6px;transition:color 0.2s;}
.binder-title:hover{color:#C8B898;}

/* BINDER */
.binder{width:100%;max-width:580px;position:relative;}

/* RINGS */
.rings{position:absolute;left:-18px;top:80px;bottom:20px;width:18px;
  display:flex;flex-direction:column;justify-content:space-around;padding:20px 0;z-index:20;}
.ring{width:16px;height:16px;border-radius:50%;background:#1A1510;
  border:2px solid #3A3028;box-shadow:inset 0 1px 3px rgba(0,0,0,.5);}

/* L1 TABS */
.tabs-l1{display:flex;flex-wrap:wrap;padding-left:12px;position:relative;z-index:10;}
.tab-l1{padding:9px 17px 13px;font-size:13px;font-weight:700;border-radius:10px 10px 0 0;
  cursor:pointer;border:none;position:relative;bottom:-2px;margin-right:3px;
  color:rgba(255,255,255,.7);user-select:none;transition:all .2s;}
.tab-l1.active{color:#fff;bottom:-3px;padding-bottom:16px;filter:brightness(1.15);
  box-shadow:0 -4px 12px rgba(0,0,0,.2);}
.tab-l1:not(.active):not(.tab-add){filter:brightness(.75) saturate(.7);}
.tab-add{background:rgba(255,255,255,.15)!important;color:#fff!important;
  filter:none!important;font-size:20px!important;font-weight:700!important;
  line-height:1!important;padding:7px 18px 11px!important;
  border:2px solid rgba(255,255,255,.5)!important;border-bottom:none!important;
  border-radius:10px 10px 0 0!important;bottom:-2px!important;position:relative!important;}
.tab-add:hover{background:rgba(255,255,255,.28)!important;border-color:rgba(255,255,255,.9)!important;}

/* PAGE STACK */
.page-stack{position:relative;}
.page-shadow{position:absolute;left:4px;right:-4px;top:4px;bottom:-4px;background:var(--paper3);border-radius:0 4px 4px 0;}
.page-shadow2{position:absolute;left:8px;right:-8px;top:8px;bottom:-8px;background:var(--paper2);border-radius:0 4px 4px 0;opacity:.6;}

/* PAGE */
.page{position:relative;z-index:5;background:var(--paper);border-radius:0 6px 6px 6px;
  border:1px solid var(--rule);box-shadow:4px 6px 24px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.5);
  padding:24px 24px 20px 32px;min-height:480px;}
.page::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background-image:repeating-linear-gradient(to bottom,transparent,transparent 31px,rgba(180,160,130,.18) 31px,rgba(180,160,130,.18) 32px);}
.page::after{content:'';position:absolute;left:24px;top:0;bottom:0;width:1px;
  background:rgba(200,100,80,.22);pointer-events:none;}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;z-index:1;}
.page-cat-label{font-size:18px;font-weight:900;letter-spacing:-.01em;}
.page-meta{font-size:11px;color:var(--ink3);letter-spacing:.1em;}

/* L2 TABS */
.tabs-l2{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;position:relative;z-index:1;}
.tab-l2{padding:5px 14px;font-size:12px;font-weight:600;border-radius:99px;
  cursor:pointer;border:1.5px solid transparent;transition:all .18s;user-select:none;}
.tab-l2.active{color:#fff;}
.tab-l2:not(.active){background:var(--paper2);color:var(--ink3);border-color:var(--rule);}
.tab-l2:not(.active):hover{border-color:var(--ink3);color:var(--ink2);}
.tab-l2-add{background:transparent!important;color:var(--ink3)!important;
  border:1.5px dashed var(--rule)!important;font-size:13px!important;padding:4px 12px!important;}
.tab-l2-add:hover{border-color:var(--ink3)!important;color:var(--ink2)!important;}

/* ENTRIES */
.entry-list{display:flex;flex-direction:column;position:relative;z-index:1;}
.entry{display:flex;align-items:flex-start;gap:10px;padding:9px 4px 9px 4px;
  border-bottom:1px solid rgba(180,160,130,.2);transition:background .15s;border-radius:6px;}
.entry:hover{background:rgba(180,160,130,.1);}
.entry:last-child{border-bottom:none;}
.entry-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--rule);
  flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.entry-check:hover{border-color:var(--ink3);}
.entry-body{flex:1;min-width:0;}
.entry-title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.4;}
.entry.answered .entry-title{text-decoration:line-through;color:var(--ink3);}
.entry-memo{font-size:11.5px;color:var(--ink2);font-style:italic;margin-top:4px;
  background:rgba(180,160,130,.12);border-left:2px solid var(--rule);
  padding:4px 8px;border-radius:0 4px 4px 0;line-height:1.55;}
.entry-date{font-size:10px;color:var(--ink3);margin-top:2px;letter-spacing:.04em;}
.entry-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s;}
.entry:hover .entry-actions{opacity:1;}
.eact{background:transparent;border:none;font-size:13px;cursor:pointer;
  color:var(--ink3);padding:3px 5px;border-radius:5px;transition:background .12s,color .12s;}
.eact:hover{background:var(--paper2);color:var(--ink);}

/* ADD ROW */
.add-row{margin-top:14px;position:relative;z-index:1;}
.add-inline{display:flex;align-items:center;gap:10px;padding:7px 8px;
  border-radius:8px;border:1.5px dashed var(--rule);transition:border-color .15s;}
.add-inline:hover{border-color:var(--ink3);}
.add-inline input{flex:1;background:transparent;border:none;outline:none;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--ink);}
.add-inline input::placeholder{color:var(--ink3);}
.add-inline-btn{padding:4px 12px;border-radius:6px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;color:#fff;transition:opacity .15s;}
.add-inline-btn:hover{opacity:.85;}

/* PAGE FOOTER */
.page-footer{position:relative;z-index:1;margin-top:16px;display:flex;align-items:center;justify-content:space-between;}
.answered-count{font-size:11px;color:var(--ink3);}
.answered-count span{font-weight:700;}

/* BOTTOM BAR */
.bottom-bar{margin-top:28px;display:flex;align-items:center;justify-content:center;
  gap:20px;font-size:11px;color:#6A6050;letter-spacing:.1em;}
.bottom-bar span{color:#9A8F7A;}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,15,10,.62);
  backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal-card{background:var(--paper);border-radius:16px;padding:26px 22px;
  max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.5);
  border:1px solid var(--rule);position:relative;animation:popIn .2s ease;}
.modal-card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background-image:repeating-linear-gradient(to bottom,transparent,transparent 31px,rgba(180,160,130,.13) 31px,rgba(180,160,130,.13) 32px);}
.modal-card h3{font-size:14px;font-weight:700;color:var(--ink3);margin-bottom:14px;
  text-align:center;letter-spacing:.08em;position:relative;z-index:1;}
.modal-input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--rule);
  outline:none;font-family:'Noto Sans KR',sans-serif;font-size:18px;font-weight:700;
  color:var(--ink);padding:6px 2px 10px;text-align:center;
  position:relative;z-index:1;display:block;}
.modal-input:focus{border-bottom-color:var(--ink2);}
.modal-hint{font-size:11px;color:var(--ink3);text-align:center;margin-top:8px;position:relative;z-index:1;}
.modal-error{color:#C0725A;font-size:11px;text-align:center;margin-top:6px;min-height:16px;position:relative;z-index:1;}
.modal-btns{display:flex;gap:8px;margin-top:18px;position:relative;z-index:1;}
.mbtn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Noto Sans KR',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;}
.mbtn-cancel{background:var(--paper2);color:var(--ink3);}
.mbtn-save{background:var(--ink);color:var(--paper);}
.mbtn-save:hover{opacity:.85;}
.mbtn-danger{background:#C0725A;color:#fff;}
.mbtn-danger:hover{opacity:.85;}

/* CONTEXT MENU */
.ctx-menu{display:none;position:fixed;background:var(--paper);border:1px solid var(--rule);
  border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:500;
  overflow:hidden;min-width:160px;animation:popIn .15s ease;}
.ctx-menu.open{display:block;}
.ctx-item{display:block;width:100%;padding:12px 18px;background:transparent;border:none;
  text-align:left;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;
  color:var(--ink);cursor:pointer;transition:background .12s;}
.ctx-item:hover{background:var(--paper2);}
.ctx-sep{height:1px;background:var(--rule);margin:2px 0;}
.ctx-danger{color:#C0725A;}
.ctx-danger:hover{background:#FDF0ED!important;}

/* DELETE CONFIRM */
.delete-icon{font-size:28px;margin-bottom:10px;text-align:center;position:relative;z-index:1;}
.delete-desc{font-size:12px;color:var(--ink3);line-height:1.7;text-align:center;
  position:relative;z-index:1;white-space:pre-line;}

/* MEMO */
.memo-card{background:var(--paper);border-radius:14px;padding:26px;width:360px;
  max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.5);border:1px solid var(--rule);
  animation:popIn .2s ease;position:relative;}
.memo-card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background-image:repeating-linear-gradient(to bottom,transparent,transparent 31px,rgba(180,160,130,.13) 31px,rgba(180,160,130,.13) 32px);}
.memo-card h3{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:14px;position:relative;z-index:1;}
.memo-card textarea{width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--rule);
  outline:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--ink);
  resize:none;min-height:90px;line-height:1.7;position:relative;z-index:1;padding-bottom:4px;}

@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
@media(max-width:480px){
  .tabs-l1{padding-left:8px;} .tab-l1{padding:7px 12px 11px;font-size:12px;}
  .page{padding:18px 14px 16px 22px;} .rings{display:none;}
}
</style>
</head>
<body>

<div class="binder-title-wrap">
  <div class="binder-title" id="binder-title-el" onclick="openModal('title-edit')">✦ 나의 기도 바인더 ✦</div>
</div>

<div class="binder">
  <div class="rings">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <div class="ring"></div><div class="ring"></div>
  </div>

  <!-- L1 TABS -->
  <div class="tabs-l1" id="tabs-l1"></div>

  <div class="page-stack">
    <div class="page-shadow2"></div><div class="page-shadow"></div>
    <div class="page">
      <div class="page-header">
        <div class="page-cat-label" id="page-cat-label"></div>
        <div class="page-meta" id="page-meta"></div>
      </div>
      <!-- L2 TABS -->
      <div class="tabs-l2" id="tabs-l2"></div>
      <!-- ENTRIES -->
      <div class="entry-list" id="entry-list"></div>
      <div class="add-row">
        <div class="add-inline">
          <input type="text" id="add-input" placeholder="새 기도제목 입력 후 Enter…">
          <button class="add-inline-btn" id="add-btn" onclick="addEntry()">추가</button>
        </div>
      </div>
      <div class="page-footer">
        <div class="answered-count" id="answered-count"></div>
        <div style="font-size:11px;color:var(--ink3)" id="page-date"></div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <span>✦ 응답된 기도</span> <span id="stat-answered">0</span>개 &nbsp;|&nbsp;
  <span>기도중</span> <span id="stat-active">0</span>개
</div>

<!-- L1 CONTEXT MENU -->
<div class="ctx-menu" id="ctx-l1">
  <button class="ctx-item" onclick="openModal('l1-rename')">✏️ 탭 이름 변경</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item ctx-danger" onclick="openDeleteConfirm('l1')">🗑️ 탭 삭제</button>
</div>

<!-- L2 CONTEXT MENU -->
<div class="ctx-menu" id="ctx-l2">
  <button class="ctx-item" onclick="openModal('l2-rename')">✏️ 소탭 이름 변경</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item ctx-danger" onclick="openDeleteConfirm('l2')">🗑️ 소탭 삭제</button>
</div>

<!-- TITLE EDIT -->
<div class="overlay" id="ov-title-edit" style="z-index:300">
  <div class="modal-card" style="width:340px">
    <h3>바인더 제목 변경</h3>
    <input class="modal-input" id="inp-title" maxlength="30" placeholder="바인더 이름">
    <div class="modal-hint">Enter로 저장 · ESC로 취소</div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('title-edit')">취소</button>
      <button class="mbtn mbtn-save" onclick="saveTitle()">저장</button>
    </div>
  </div>
</div>

<!-- L1 ADD -->
<div class="overlay" id="ov-l1-add" style="z-index:400">
  <div class="modal-card" style="width:300px">
    <h3>새 탭 추가</h3>
    <input class="modal-input" id="inp-l1-add" maxlength="12" placeholder="탭 이름">
    <div class="modal-error" id="err-l1-add"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('l1-add')">취소</button>
      <button class="mbtn mbtn-save" onclick="confirmL1Add()">추가</button>
    </div>
  </div>
</div>

<!-- L1 RENAME -->
<div class="overlay" id="ov-l1-rename" style="z-index:400">
  <div class="modal-card" style="width:300px">
    <h3>탭 이름 변경</h3>
    <input class="modal-input" id="inp-l1-rename" maxlength="12" placeholder="새 이름">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('l1-rename')">취소</button>
      <button class="mbtn mbtn-save" onclick="confirmL1Rename()">저장</button>
    </div>
  </div>
</div>

<!-- L2 ADD -->
<div class="overlay" id="ov-l2-add" style="z-index:400">
  <div class="modal-card" style="width:300px">
    <h3>새 소탭 추가</h3>
    <input class="modal-input" id="inp-l2-add" maxlength="12" placeholder="소탭 이름">
    <div class="modal-error" id="err-l2-add"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('l2-add')">취소</button>
      <button class="mbtn mbtn-save" onclick="confirmL2Add()">추가</button>
    </div>
  </div>
</div>

<!-- L2 RENAME -->
<div class="overlay" id="ov-l2-rename" style="z-index:400">
  <div class="modal-card" style="width:300px">
    <h3>소탭 이름 변경</h3>
    <input class="modal-input" id="inp-l2-rename" maxlength="12" placeholder="새 이름">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('l2-rename')">취소</button>
      <button class="mbtn mbtn-save" onclick="confirmL2Rename()">저장</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="overlay" id="ov-delete" style="z-index:450">
  <div class="modal-card" style="width:300px">
    <div class="delete-icon">🗑️</div>
    <h3 id="del-title"></h3>
    <div class="delete-desc" id="del-desc"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('delete')">취소</button>
      <button class="mbtn mbtn-danger" onclick="execDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- MEMO -->
<div class="overlay" id="ov-memo" style="z-index:300">
  <div class="memo-card">
    <h3 id="memo-label"></h3>
    <textarea id="memo-ta" placeholder="기도하며 느낀 것, 말씀, 마음을 기록하세요…"></textarea>
    <div class="modal-btns" style="margin-top:16px;position:relative;z-index:1">
      <button class="mbtn mbtn-cancel" onclick="closeModal('memo')">취소</button>
      <button class="mbtn mbtn-save" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<script>
const PALETTE = [
  '#C0725A','#5A8C6A','#4A6E9C','#8A5A9C','#9C7A3A','#3A8C8C','#7A6C9C','#7A9C5A'
];
function col(idx){ return PALETTE[idx % PALETTE.length]; }
function uid(){ return Date.now() + Math.random().toString(36).slice(2,6); }

const DEFAULT_TABS = [
  { id:'t1', name:'가정',  color:PALETTE[0], subs:[ {id:'s11',name:'전체'} ] },
  { id:'t2', name:'업',    color:PALETTE[1], subs:[ {id:'s21',name:'전체'} ] },
  { id:'t3', name:'중등부',color:PALETTE[2], subs:[
    {id:'s31',name:'8반'}, {id:'s32',name:'부총무'}
  ]},
  { id:'t4', name:'청년국',color:PALETTE[3], subs:[ {id:'s41',name:'전체'} ] },
];
const DEFAULT_ITEMS = [
  {id:'i1', tabId:'t1',subId:'s11',title:'어머니 전도', memo:'',date:'2025-03-20',answered:false,answeredAt:null},
  {id:'i2', tabId:'t1',subId:'s11',title:'결혼',         memo:'',date:'2025-03-20',answered:false,answeredAt:null},
  {id:'i3', tabId:'t2',subId:'s21',title:'히찌',          memo:'',date:'2025-03-22',answered:false,answeredAt:null},
  {id:'i4', tabId:'t2',subId:'s21',title:'르호봇',        memo:'',date:'2025-03-22',answered:false,answeredAt:null},
  {id:'i5', tabId:'t3',subId:'s31',title:'8반 기도',      memo:'',date:'2025-03-25',answered:false,answeredAt:null},
  {id:'i6', tabId:'t3',subId:'s32',title:'부총무 사역',   memo:'',date:'2025-03-25',answered:false,answeredAt:null},
  {id:'i7', tabId:'t3',subId:'s32',title:'선교대회 – 일본 부스',memo:'',date:'2025-03-25',answered:false,answeredAt:null},
  {id:'i8', tabId:'t3',subId:'s32',title:'성주 축구 캠프',memo:'',date:'2025-03-25',answered:false,answeredAt:null},
  {id:'i9', tabId:'t4',subId:'s41',title:'그룹장',        memo:'',date:'2025-03-26',answered:false,answeredAt:null},
  {id:'i10',tabId:'t4',subId:'s41',title:'드림캐쳐',      memo:'',date:'2025-03-26',answered:false,answeredAt:null},
  {id:'i11',tabId:'t4',subId:'s41',title:'영산업인지교회',memo:'',date:'2025-03-26',answered:false,answeredAt:null},
  {id:'i12',tabId:'t4',subId:'s41',title:'대경지부',      memo:'',date:'2025-03-26',answered:false,answeredAt:null},
];

let tabs        = JSON.parse(localStorage.getItem('pb_tabs')  || 'null') || DEFAULT_TABS;
let items       = JSON.parse(localStorage.getItem('pb_items') || 'null') || DEFAULT_ITEMS;
let binderTitle = localStorage.getItem('pb_title') || '✦ 나의 기도 바인더 ✦';

let curTabId    = tabs[0]?.id || '';
let curSubId    = tabs[0]?.subs[0]?.id || '';
let memoItemId  = null;

let ctxL1TabId  = null;
let ctxL2SubId  = null;
let deleteTarget= null;
let longTimer   = null;

function saveAll(){ localStorage.setItem('pb_tabs',JSON.stringify(tabs)); localStorage.setItem('pb_items',JSON.stringify(items)); }
function today(){ return new Date().toISOString().slice(0,10); }
function curTab(){ return tabs.find(t=>t.id===curTabId); }
function curSub(){ return curTab()?.subs.find(s=>s.id===curSubId); }

function openModal(key){
  document.getElementById('ov-'+key).classList.add('open');
  const inp = document.getElementById('inp-'+key);
  if(inp){ setTimeout(()=>{inp.focus();inp.select();},80); }
}
function closeModal(key){ document.getElementById('ov-'+key).classList.remove('open'); }

document.getElementById('binder-title-el').onclick = () => {
  document.getElementById('inp-title').value = binderTitle;
  openModal('title-edit');
};

function saveTitle(){
  const v = document.getElementById('inp-title').value.trim();
  if(!v) return;
  binderTitle = v;
  localStorage.setItem('pb_title', binderTitle);
  document.getElementById('binder-title-el').textContent = binderTitle;
  closeModal('title-edit');
}

function startLong(e, fn){ cancelLong(); longTimer = setTimeout(()=>fn(e), 600); }
function cancelLong(){ if(longTimer){clearTimeout(longTimer);longTimer=null;} }

function showCtx(menuId, e){
  const menu = document.getElementById(menuId);
  menu.classList.add('open');
  menu.style.visibility='hidden'; menu.style.left='0'; menu.style.top='0';
  requestAnimationFrame(()=>{
    const mh=menu.offsetHeight, mw=menu.offsetWidth;
    const cx = e.clientX||(e.touches&&e.touches[0]?.clientX)||100;
    const cy = e.clientY||(e.touches&&e.touches[0]?.clientY)||100;
    menu.style.left = Math.min(cx, window.innerWidth-mw-8)+'px';
    menu.style.top  = Math.max(8, cy-mh-8)+'px';
    menu.style.visibility='visible';
  });
}
function closeCtx(id){ document.getElementById(id).classList.remove('open'); }

function longL1(e, tabId){ ctxL1TabId = tabId; showCtx('ctx-l1', e); }
function longL2(e, subId){ ctxL2SubId = subId; showCtx('ctx-l2', e); }

function openL1Add(){ document.getElementById('inp-l1-add').value=''; document.getElementById('err-l1-add').textContent=''; openModal('l1-add'); }
function confirmL1Add(){
  const v = document.getElementById('inp-l1-add').value.trim();
  if(!v) return;
  if(tabs.find(t=>t.name===v)){ document.getElementById('err-l1-add').textContent='이미 있는 이름입니다.'; return; }
  const newTab = { id:uid(), name:v, color:PALETTE[tabs.length%PALETTE.length], subs:[{id:uid(),name:'전체'}] };
  tabs.push(newTab);
  curTabId = newTab.id;
  curSubId = newTab.subs[0].id;
  saveAll(); closeModal('l1-add'); render();
}

function openL1Rename(){ closeCtx('ctx-l1'); const t = tabs.find(t=>t.id===ctxL1TabId); if(!t) return; document.getElementById('inp-l1-rename').value = t.name; openModal('l1-rename'); }
function confirmL1Rename(){
  const v = document.getElementById('inp-l1-rename').value.trim();
  if(!v) return;
  const t = tabs.find(t=>t.id===ctxL1TabId);
  if(t) t.name = v;
  saveAll(); closeModal('l1-rename'); render();
}

function openL2Add(){ document.getElementById('inp-l2-add').value=''; document.getElementById('err-l2-add').textContent=''; openModal('l2-add'); }
function confirmL2Add(){
  const v = document.getElementById('inp-l2-add').value.trim();
  if(!v) return;
  const t = curTab();
  if(!t) return;
  if(t.subs.find(s=>s.name===v)){ document.getElementById('err-l2-add').textContent='이미 있는 이름입니다.'; return; }
  const ns = {id:uid(), name:v};
  t.subs.push(ns);
  curSubId = ns.id;
  saveAll(); closeModal('l2-add'); render();
}

function openL2Rename(){ closeCtx('ctx-l2'); const t = curTab(); const s = t?.subs.find(s=>s.id===ctxL2SubId); if(!s) return; document.getElementById('inp-l2-rename').value = s.name; openModal('l2-rename'); }
function confirmL2Rename(){
  const v = document.getElementById('inp-l2-rename').value.trim();
  if(!v) return;
  const t = curTab();
  const s = t?.subs.find(s=>s.id===ctxL2SubId);
  if(s) s.name = v;
  saveAll(); closeModal('l2-rename'); render();
}

function openDeleteConfirm(type){
  closeCtx('ctx-l1'); closeCtx('ctx-l2');
  if(type==='l1'){
    const t = tabs.find(t=>t.id===ctxL1TabId);
    if(!t) return;
    const cnt = items.filter(i=>i.tabId===ctxL1TabId).length;
    document.getElementById('del-title').textContent = '"'+t.name+'" 탭을 삭제할까요?';
    document.getElementById('del-desc').textContent = cnt>0 ? '기도제목 '+cnt+'개가 함께 삭제됩니다.\n되돌릴 수 없습니다.' : '되돌릴 수 없습니다.';
    deleteTarget = {type:'l1', tabId:ctxL1TabId};
  } else {
    const t = curTab();
    const s = t?.subs.find(s=>s.id===ctxL2SubId);
    if(!s) return;
    const cnt = items.filter(i=>i.subId===ctxL2SubId).length;
    document.getElementById('del-title').textContent = '"'+s.name+'" 소탭을 삭제할까요?';
    document.getElementById('del-desc').textContent = cnt>0 ? '기도제목 '+cnt+'개가 함께 삭제됩니다.\n되돌릴 수 없습니다.' : '되돌릴 수 없습니다.';
    deleteTarget = {type:'l2', tabId:curTabId, subId:ctxL2SubId};
  }
  openModal('delete');
}
function execDelete(){
  if(!deleteTarget){ closeModal('delete'); return; }
  if(deleteTarget.type==='l1'){
    const idx = tabs.findIndex(t=>t.id===deleteTarget.tabId);
    if(idx>-1){ tabs.splice(idx,1); items = items.filter(i=>i.tabId!==deleteTarget.tabId); curTabId = tabs[Math.max(0,idx-1)]?.id || tabs[0]?.id || ''; curSubId = tabs.find(t=>t.id===curTabId)?.subs[0]?.id || ''; }
  } else {
    const t = tabs.find(t=>t.id===deleteTarget.tabId);
    if(t){ const idx = t.subs.findIndex(s=>s.id===deleteTarget.subId); if(idx>-1){ t.subs.splice(idx,1); items = items.filter(i=>i.subId!==deleteTarget.subId); curSubId = t.subs[Math.max(0,idx-1)]?.id || t.subs[0]?.id || ''; } }
  }
  deleteTarget=null;
  saveAll(); closeModal('delete'); render();
}

function addEntry(){
  const inp = document.getElementById('add-input');
  const title = inp.value.trim();
  if(!title||!curTabId||!curSubId) return;
  items.push({id:uid(),tabId:curTabId,subId:curSubId,title,memo:'',date:today(),answered:false,answeredAt:null});
  inp.value='';
  saveAll(); renderEntries();
}
function toggleAnswered(id){
  const item=items.find(i=>i.id===id); if(!item) return;
  item.answered=!item.answered; item.answeredAt=item.answered?today():null;
  saveAll(); renderEntries();
}
function deleteItem(id){ if(!confirm('이 기도제목을 삭제할까요?')) return; items=items.filter(i=>i.id!==id); saveAll(); renderEntries(); }
function openMemo(id){
  memoItemId=id; const item=items.find(i=>i.id===id);
  document.getElementById('memo-label').textContent=item.title;
  document.getElementById('memo-ta').value=item.memo||'';
  openModal('memo'); setTimeout(()=>document.getElementById('memo-ta').focus(),80);
}
function saveMemo(){
  const item=items.find(i=>i.id===memoItemId);
  if(item){ item.memo=document.getElementById('memo-ta').value.trim(); saveAll(); renderEntries(); }
  closeModal('memo');
}

function renderL1Tabs(){
  const el = document.getElementById('tabs-l1');
  el.innerHTML = tabs.map((t,i)=>`<button class="tab-l1 ${t.id===curTabId?'active':''}"
      style="background:${t.color}"
      onclick="switchL1('${t.id}')"
      onmousedown="startLong(event,(e)=>longL1(e,'${t.id}'))"
      onmouseup="cancelLong()" onmouseleave="cancelLong()"
      ontouchstart="startLong(event,(e)=>longL1(e,'${t.id}'))"
      ontouchend="cancelLong()">${t.name}</button>`).join('')
    + `<button class="tab-l1 tab-add" onclick="openL1Add()">＋</button>`;
}

function renderL2Tabs(){
  const t = curTab(); const el = document.getElementById('tabs-l2');
  if(!t){ el.innerHTML=''; return; }
  el.innerHTML = t.subs.map(s=>`<button class="tab-l2 ${s.id===curSubId?'active':''}"
      style="${s.id===curSubId?'background:'+t.color+';border-color:'+t.color+';color:#fff':''}"
      onclick="switchL2('${s.id}')"
      onmousedown="startLong(event,(e)=>longL2(e,'${s.id}'))"
      onmouseup="cancelLong()" onmouseleave="cancelLong()"
      ontouchstart="startLong(event,(e)=>longL2(e,'${s.id}'))"
      ontouchend="cancelLong()">${s.name}</button>`).join('')
    + `<button class="tab-l2 tab-l2-add" onclick="openL2Add()">＋ 소탭</button>`;
}

function renderEntries(){
  const t = curTab(); const mainColor = t ? t.color : '#888';
  const subItems = items.filter(i=>i.tabId===curTabId && i.subId===curSubId);
  const answered = subItems.filter(i=>i.answered).length;
  const allTab = items.filter(i=>i.tabId===curTabId);

  document.getElementById('page-cat-label').textContent = t?.name||'';
  document.getElementById('page-cat-label').style.color = mainColor;
  document.getElementById('page-meta').textContent = allTab.length+'개 · 응답 '+allTab.filter(i=>i.answered).length+'개';

  const now=new Date();
  document.getElementById('page-date').textContent =
    now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0');

  const list = document.getElementById('entry-list');
  if(!subItems.length){
    list.innerHTML='<div style="padding:20px 0;text-align:center;color:var(--ink3);font-size:13px">아직 기도제목이 없습니다<br><span style="font-size:11px;opacity:.6">아래에 추가해보세요</span></div>';
  } else {
    const sorted=[...subItems].sort((a,b)=>{
      if(a.answered!==b.answered) return a.answered?1:-1;
      if(a.answered&&b.answered) return (b.answeredAt||b.date)>(a.answeredAt||a.date)?1:-1;
      return b.id>a.id?-1:1;
    });
    list.innerHTML=sorted.map(item=>`
      <div class="entry ${item.answered?'answered':''}">
        <div class="entry-check" onclick="toggleAnswered('${item.id}')"
          style="${item.answered?'background:'+mainColor+';border-color:'+mainColor+';color:#fff':''}">
          ${item.answered?'✓':''}
        </div>
        <div class="entry-body">
          <div class="entry-title">${item.title}</div>
          ${item.memo?'<div class="entry-memo">'+item.memo+'</div>':''}
          <div class="entry-date">${item.date}${item.answeredAt?' · 응답 '+item.answeredAt:''}</div>
        </div>
        <div class="entry-actions">
          <button class="eact" onclick="openMemo('${item.id}')">📝</button>
          <button class="eact" onclick="deleteItem('${item.id}')">×</button>
        </div>
      </div>`).join('');
  }

  document.getElementById('answered-count').innerHTML = '응답됨 <span style="color:'+mainColor+'">'+answered+'</span> / '+subItems.length;
  document.getElementById('add-btn').style.background = mainColor;
  document.getElementById('stat-answered').textContent = items.filter(i=>i.answered).length;
  document.getElementById('stat-active').textContent   = items.filter(i=>!i.answered).length;
}

function render(){ renderL1Tabs(); renderL2Tabs(); renderEntries(); }
function switchL1(tabId){ curTabId = tabId; curSubId = tabs.find(t=>t.id===tabId)?.subs[0]?.id||''; render(); }
function switchL2(subId){ curSubId=subId; renderL2Tabs(); renderEntries(); }

document.getElementById('add-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addEntry(); });

[
  ['title-edit', saveTitle],
  ['l1-add', confirmL1Add],
  ['l1-rename', confirmL1Rename],
  ['l2-add', confirmL2Add],
  ['l2-rename', confirmL2Rename],
].forEach(([key, saveFn])=>{
  const inp = document.getElementById('inp-'+key);
  if(inp){ inp.addEventListener('keydown',e=>{ if(e.key==='Enter') saveFn(); if(e.key==='Escape') closeModal(key); }); }
  const ov = document.getElementById('ov-'+key);
  if(ov) ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(key); });
});
document.getElementById('ov-delete').addEventListener('click',e=>{ if(e.target===document.getElementById('ov-delete')) closeModal('delete'); });
document.getElementById('ov-memo').addEventListener('click',e=>{ if(e.target===document.getElementById('ov-memo')) closeModal('memo'); });
document.addEventListener('click',e=>{
  ['ctx-l1','ctx-l2'].forEach(id=>{ const m=document.getElementById(id); if(m.classList.contains('open')&&!m.contains(e.target)) closeCtx(id); });
});

document.getElementById('binder-title-el').textContent = binderTitle;
render();
</script>
</body>
</html>
